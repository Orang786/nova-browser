<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>История — Nova Browser</title>
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #1e1e36;
      --bg-hover: #1f2b47;
      --bg-input: #0d1117;

      --text-primary: #e6e6e6;
      --text-secondary: #a0a0b0;
      --text-muted: #6b6b80;

      --accent: #7c3aed;
      --accent-hover: #9333ea;
      --accent-light: rgba(124, 58, 237, 0.15);

      --border-color: #2a2a3e;
      --danger: #ef4444;

      --radius: 12px;
      --radius-sm: 8px;
      --transition: all 0.2s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-y: auto;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ======== HEADER ======== */

    .history-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 32px 48px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .header-top h1 {
      font-size: 28px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-top h1 span.icon {
      font-size: 32px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.12);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: white;
    }

    .btn-secondary {
      background: var(--bg-hover);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      color: var(--text-primary);
      background: var(--bg-card);
    }

    /* Search */
    .search-container {
      position: relative;
    }

    .search-input {
      width: 100%;
      height: 44px;
      background: var(--bg-input);
      border: 2px solid var(--border-color);
      border-radius: 999px;
      padding: 0 20px 0 44px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: var(--transition);
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
    }

    .search-stats {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ======== CONTENT ======== */

    .history-content {
      padding: 24px 48px 48px;
      max-width: 900px;
    }

    /* Day group */
    .day-group {
      margin-bottom: 32px;
    }

    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }

    .day-icon {
      font-size: 18px;
    }

    .day-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
    }

    .day-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--accent-light);
      padding: 2px 10px;
      border-radius: 999px;
    }

    /* History item */
    .history-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      cursor: pointer;
      position: relative;
    }

    .history-item:hover {
      background: var(--bg-hover);
    }

    .history-item-time {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 50px;
      font-family: 'Consolas', 'Courier New', monospace;
      flex-shrink: 0;
    }

    .history-item-favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
      background: var(--border-color);
    }

    .history-item-info {
      flex: 1;
      overflow: hidden;
    }

    .history-item-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .history-item-url {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item-url:hover {
      color: var(--accent);
    }

    .history-item-delete {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: var(--transition);
      flex-shrink: 0;
      font-size: 16px;
    }

    .history-item:hover .history-item-delete {
      opacity: 1;
    }

    .history-item-delete:hover {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .empty-state-desc {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Notification */
    .notification {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-secondary);
      border: 1px solid var(--accent);
      padding: 14px 24px;
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      font-size: 14px;
      z-index: 9999;
      display: none;
      animation: slideUp 0.3s ease;
    }

    .notification.show { display: block; }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- ======== HEADER ======== -->
  <header class="history-header">
    <div class="header-top">
      <h1>
        <span class="icon">🕐</span>
        История
      </h1>
      <div class="header-actions">
        <button class="btn btn-secondary" id="btn-export">📄 Экспорт</button>
        <button class="btn btn-danger" id="btn-clear-all">🗑️ Очистить всю историю</button>
      </div>
    </div>
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input"
             placeholder="Поиск по истории..." autofocus>
      <span class="search-stats" id="search-stats"></span>
    </div>
  </header>

  <!-- ======== CONTENT ======== -->
  <main class="history-content" id="history-content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>Загрузка истории...</div>
    </div>
  </main>

  <!-- Notification -->
  <div class="notification" id="notification"></div>

  <script>
    // ============================================
    // HISTORY PAGE LOGIC
    // ============================================

    let allHistory = [];

    // Simulated history data (в реальном приложении загрузка через IPC)
    function generateSampleHistory() {
      const sites = [
        { title: 'Google', url: 'https://www.google.com' },
        { title: 'YouTube - Главная', url: 'https://www.youtube.com' },
        { title: 'GitHub: Let\'s build', url: 'https://github.com' },
        { title: 'Stack Overflow', url: 'https://stackoverflow.com/questions' },
        { title: 'MDN Web Docs', url: 'https://developer.mozilla.org' },
        { title: 'Reddit - Pair Programming', url: 'https://www.reddit.com' },
        { title: 'Хабр — сообщество IT-специалистов', url: 'https://habr.com' },
        { title: 'Wikipedia', url: 'https://ru.wikipedia.org' },
        { title: 'Electron | Build cross-platform desktop apps', url: 'https://www.electronjs.org' },
        { title: 'Node.js', url: 'https://nodejs.org' },
        { title: 'Twitter / X', url: 'https://twitter.com' },
        { title: 'Figma – Collaborative Design', url: 'https://www.figma.com' },
      ];

      const history = [];
      const now = Date.now();

      for (let i = 0; i < 60; i++) {
        const site = sites[Math.floor(Math.random() * sites.length)];
        const hoursAgo = Math.floor(Math.random() * 72); // 3 дня
        history.push({
          id: (now - i * 100000).toString(),
          title: site.title,
          url: site.url + (i > 0 ? `?ref=${i}` : ''),
          date: new Date(now - hoursAgo * 3600000).toISOString()
        });
      }

      // Сортировка по дате (новые сверху)
      history.sort((a, b) => new Date(b.date) - new Date(a.date));
      return history;
    }

    // ============================================
    // RENDER
    // ============================================

    function renderHistory(items) {
      const content = document.getElementById('history-content');

      if (items.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <div class="empty-state-title">История пуста</div>
            <div class="empty-state-desc">Здесь будут отображаться посещённые сайты</div>
          </div>
        `;
        return;
      }

      // Группировка по дням
      const groups = {};
      items.forEach(item => {
        const date = new Date(item.date);
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);

        let dayKey;
        if (date.toDateString() === today.toDateString()) {
          dayKey = 'Сегодня';
        } else if (date.toDateString() === yesterday.toDateString()) {
          dayKey = 'Вчера';
        } else {
          dayKey = date.toLocaleDateString('ru-RU', {
            weekday: 'long',
            day: 'numeric',
            month: 'long',
            year: 'numeric'
          });
          // Capitalize first letter
          dayKey = dayKey.charAt(0).toUpperCase() + dayKey.slice(1);
        }

        if (!groups[dayKey]) groups[dayKey] = [];
        groups[dayKey].push(item);
      });

      let html = '';
      const dayIcons = ['📅', '📆', '🗓️'];
      let iconIdx = 0;

      for (const [day, entries] of Object.entries(groups)) {
        html += `
          <div class="day-group">
            <div class="day-header">
              <span class="day-icon">${dayIcons[iconIdx % dayIcons.length]}</span>
              <span class="day-title">${day}</span>
              <span class="day-count">${entries.length} записей</span>
            </div>
        `;

        entries.forEach(item => {
          const time = new Date(item.date).toLocaleTimeString('ru-RU', {
            hour: '2-digit',
            minute: '2-digit'
          });

          const domain = getDomain(item.url);
          const favicon = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;

          html += `
            <div class="history-item" data-url="${escapeAttr(item.url)}" data-id="${item.id}">
              <span class="history-item-time">${time}</span>
              <img class="history-item-favicon" src="${favicon}"
                   onerror="this.style.background='var(--border-color)';this.src=''" alt="">
              <div class="history-item-info">
                <div class="history-item-title">${escapeHtml(item.title || 'Без названия')}</div>
                <div class="history-item-url">${escapeHtml(item.url)}</div>
              </div>
              <button class="history-item-delete" data-id="${item.id}" title="Удалить">✕</button>
            </div>
          `;
        });

        html += '</div>';
        iconIdx++;
      }

      content.innerHTML = html;

      // Events
      content.querySelectorAll('.history-item').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.closest('.history-item-delete')) return;
          window.location.href = el.dataset.url;
        });
      });

      content.querySelectorAll('.history-item-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          allHistory = allHistory.filter(h => h.id !== id);
          btn.closest('.history-item').remove();
          updateStats();
          showNotification('Запись удалена');
        });
      });
    }

    // ============================================
    // SEARCH
    // ============================================

    const searchInput = document.getElementById('search-input');
    let searchTimeout;

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const query = searchInput.value.trim().toLowerCase();
        if (query) {
          const filtered = allHistory.filter(h =>
            h.title?.toLowerCase().includes(query) ||
            h.url?.toLowerCase().includes(query)
          );
          renderHistory(filtered);
          updateStats(filtered.length);
        } else {
          renderHistory(allHistory);
          updateStats();
        }
      }, 250);
    });

    // ============================================
    // ACTIONS
    // ============================================

    // Clear all
    document.getElementById('btn-clear-all').addEventListener('click', () => {
      if (confirm('Удалить всю историю просмотров? Это действие нельзя отменить.')) {
        allHistory = [];
        renderHistory([]);
        updateStats();
        showNotification('История очищена 🗑️');
      }
    });

    // Export
    document.getElementById('btn-export').addEventListener('click', () => {
      const data = JSON.stringify(allHistory, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `nova-history-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showNotification('История экспортирована 📄');
    });

    // ============================================
    // HELPERS
    // ============================================

    function getDomain(url) {
      try {
        return new URL(url).hostname;
      } catch {
        return '';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function escapeAttr(text) {
      return (text || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function updateStats(count) {
      const stats = document.getElementById('search-stats');
      const total = count !== undefined ? count : allHistory.length;
      stats.textContent = `${total} записей`;
    }

    function showNotification(text) {
      const notif = document.getElementById('notification');
      notif.textContent = text;
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 2500);
    }

    // ============================================
    // INIT
    // ============================================

    setTimeout(() => {
      allHistory = generateSampleHistory();
      renderHistory(allHistory);
      updateStats();
    }, 500);
  </script>
</body>
</html>
